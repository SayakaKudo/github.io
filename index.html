<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Secret Page</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="login">
<h2>ログイン</h2>
<input id="by" placeholder="誕生年"><br>
<input id="bm" placeholder="誕生月"><br>
<input id="bd" placeholder="誕生日"><br>
<input id="bfamily" placeholder="彼氏 苗字"><br>
<input id="bname" placeholder="彼氏 名前"><br>
<input id="gfamily" placeholder="彼女 苗字"><br>
<input id="gname" placeholder="彼女 名前"><br>
<button onclick="login()">ログイン</button>
<p id="error"></p>
</div>

<div id="question" class="hidden">
<h2 id="qText"></h2>
<button onclick="answer('yes')">Yes</button>
<button id="noBtn">No</button>
</div>

<div id="done" class="hidden">
<h2>ありがとう</h2>
<p>回答を受け取りました。</p>
<button onclick="location.reload()">ホームへ戻る</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<script src="script.js"></script>

</body>
</html>
