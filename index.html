<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Secret Page</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <!-- ログイン画面 -->
  <div id="login" class="card">

    <p class="label">あなたの生年月日を入力してください</p>
    <div class="row date">
      <input id="bm" placeholder="月">
      <input id="bd" placeholder="日">
    </div>

    <p class="label">あなたの氏名を入力してください</p>
    <div class="row">
      <input id="bfamily" placeholder="氏">
      <input id="bname" placeholder="名">
    </div>

    <p class="label">彼女の生年月日を入力してください</p>
    <div class="row date">
      <input id="gm" placeholder="月">
      <input id="gd" placeholder="日">
    </div>

    <p class="label">彼女の氏名を入力してください</p>
    <div class="row">
      <input id="gfamily" placeholder="氏">
      <input id="gname" placeholder="名">
    </div>

    <button class="main-btn" onclick="login()">ログイン</button>
    <p id="error"></p>
  </div>

  <!-- 質問画面 -->
  <div id="question" class="card hidden">
    <h2 id="qText"></h2>
    <div class="btn-group">
      <button class="yes" onclick="answer('yes')">Yes</button>
      <button id="noBtn" class="no">No</button>
    </div>
  </div>

  <!-- 完了画面 -->
  <div id="done" class="card hidden">
    <p>回答を紗華に送信しました。</p>
    <button class="main-btn" onclick="location.reload()">ホームへ戻る</button>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<script src="script.js"></script>

</body>
</html>
